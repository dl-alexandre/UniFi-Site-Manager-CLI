name: Update Homebrew Tap

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to update tap for'
        required: true
        default: 'v0.0.3'

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: dl-alexandre/homebrew-tap
          token: ${{ secrets.TAP_UPDATE_TOKEN }}
          path: tap

      - name: Download release assets
        run: |
          mkdir -p dist
          cd dist
          
          # Download all platform binaries
          curl -L -o usm-darwin-arm64 "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.tag.outputs.tag }}/usm-darwin-arm64"
          curl -L -o usm-darwin-amd64 "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.tag.outputs.tag }}/usm-darwin-amd64"
          curl -L -o usm-linux-arm64 "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.tag.outputs.tag }}/usm-linux-arm64"
          curl -L -o usm-linux-amd64 "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.tag.outputs.tag }}/usm-linux-amd64"

      - name: Calculate SHA256 hashes
        id: hashes
        run: |
          cd dist
          echo "darwin_arm64=$(sha256sum usm-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(sha256sum usm-darwin-amd64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(sha256sum usm-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(sha256sum usm-linux-amd64 | cut -d' ' -f1)" >> $GITHUB_OUTPUT
          echo "version=${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Update formula
        run: |
          cd tap
          
          # Update the formula file
          cat > Formula/usm.rb << 'EOF'
          class Usm < Formula
            desc "UniFi Site Manager CLI for cloud-based site management"
            homepage "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI"
            version "${{ steps.hashes.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.hashes.outputs.version }}/usm-darwin-arm64"
                sha256 "${{ steps.hashes.outputs.darwin_arm64 }}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.hashes.outputs.version }}/usm-darwin-amd64"
                sha256 "${{ steps.hashes.outputs.darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.hashes.outputs.version }}/usm-linux-arm64"
                sha256 "${{ steps.hashes.outputs.linux_arm64 }}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/releases/download/${{ steps.hashes.outputs.version }}/usm-linux-amd64"
                sha256 "${{ steps.hashes.outputs.linux_amd64 }}"
              end
            end

            def install
              bin.install "usm-darwin-arm64" => "usm" if OS.mac? && Hardware::CPU.arm?
              bin.install "usm-darwin-amd64" => "usm" if OS.mac? && Hardware::CPU.intel?
              bin.install "usm-linux-arm64" => "usm" if OS.linux? && Hardware::CPU.arm?
              bin.install "usm-linux-amd64" => "usm" if OS.linux? && Hardware::CPU.intel?
            end

            test do
              system "#{bin}/usm", "version"
            end
          end
          EOF

      - name: Commit and push changes
        run: |
          cd tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/usm.rb
          git commit -m "Update usm to ${{ steps.hashes.outputs.version }}" || echo "No changes to commit"
          git push
