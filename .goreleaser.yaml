# GoReleaser configuration for UniFi Site Manager CLI
# Documentation: https://goreleaser.com

version: 2

project_name: usm

before:
  hooks:
    # Install dependencies
    - go mod tidy
    - go mod download
    # Run tests to ensure quality before release
    - go test ./...

builds:
  - id: usm
    main: ./cmd/usm
    binary: usm
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "7"
    ignore:
      # Skip 32-bit builds
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.gitCommit={{.Commit}}
      - -X main.buildTime={{.Date}}
    flags:
      - -trimpath

archives:
  - id: usm
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat[/(].*"
      order: 0
    - title: Bug Fixes
      regexp: "^fix[/(].*"
      order: 1
    - title: Improvements
      regexp: "^improve[/(].*"
      order: 2
    - title: Other
      order: 999

release:
  github:
    owner: dl-alexandre
    name: UniFi-Site-Manager-CLI
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## UniFi Site Manager CLI v{{.Version}}
    
    Full Changelog: https://github.com/dl-alexandre/UniFi-Site-Manager-CLI/compare/{{.PreviousTag}}...v{{.Version}}
  footer: |
    ## Installation
    
    ### Binary Download
    Download the appropriate binary for your platform from the assets below.
    
    ### Verification
    Verify checksums:
    ```bash
    sha256sum -c checksums.txt
    ```

# Homebrew tap configuration
# Requires HOMEBREW_TAP_TOKEN secret with 'repo' scope
brews:
  - name: usm
    repository:
      owner: dl-alexandre
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: master
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: goreleaser@carlosbecker.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    description: "Full-featured CLI for managing UniFi networks via Site Manager API"
    homepage: "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI"
    license: "MIT"
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}false{{ else }}true{{ end }}"
    test: |
      system "#{bin}/usm", "version"
    install: |
      bin.install "usm"

# Scoop configuration for Windows
# Requires SCOOP_BUCKET_TOKEN secret with 'repo' scope  
scoops:
  - repository:
      owner: dl-alexandre
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
      branch: master
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: goreleaser@carlosbecker.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    description: "Full-featured CLI for managing UniFi networks via Site Manager API"
    homepage: "https://github.com/dl-alexandre/UniFi-Site-Manager-CLI"
    license: MIT
    skip_upload: "{{ if index .Env \"SCOOP_BUCKET_TOKEN\" }}false{{ else }}true{{ end }}"
    persist:
      - "config.yaml"

