# UniFi Controller Services

restart_device:
  name: Restart Device
  description: Restart a UniFi device by MAC address
  fields:
    device_mac:
      name: Device MAC
      description: MAC address of the device to restart
      required: true
      selector:
        text:

block_client:
  name: Block Client
  description: Block or unblock a network client
  fields:
    client_mac:
      name: Client MAC
      description: MAC address of the client to block/unblock
      required: true
      selector:
        text:
    block:
      name: Block
      description: True to block, False to unblock
      required: true
      default: true
      selector:
        boolean:

reconnect_client:
  name: Reconnect Client
  description: Force a client to reconnect to the network
  fields:
    client_mac:
      name: Client MAC
      description: MAC address of the client to reconnect
      required: true
      selector:
        text:
